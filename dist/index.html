    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 3em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
            font-size: 1.1em;
        }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group label {
            font-weight: bold;
            color: #333;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .filter-btn:hover {
            background: #f0f0f0;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .workspace-section {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            overflow: hidden;
        }

        .workspace-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: all 0.3s ease;
        }

        .workspace-header:hover {
            opacity: 0.9;
        }

        .workspace-header .toggle-icon {
            font-size: 1.2em;
            transition: transform 0.3s ease;
        }

        .workspace-section.collapsed .workspace-header .toggle-icon {
            transform: rotate(-90deg);
        }

        .workspace-content {
            padding: 20px;
            max-height: 2000px;
            overflow: hidden;
            transition: max-height 0.5s ease, padding 0.5s ease;
        }

        .workspace-section.collapsed .workspace-content {
            max-height: 0;
            padding: 0 20px;
        }

        .task-group {
            margin-bottom: 30px;
        }

        .task-group-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: all 0.3s ease;
        }

        .task-group-title:hover {
            opacity: 0.8;
        }

        .task-group-title .toggle-icon {
            font-size: 0.8em;
            transition: transform 0.3s ease;
        }

        .task-group.collapsed .task-group-title .toggle-icon {
            transform: rotate(-90deg);
        }

        .task-group .task-list {
            max-height: 2000px;
            overflow: hidden;
            transition: max-height 0.5s ease;
        }

        .task-group.collapsed .task-list {
            max-height: 0;
        }

        .task-list {
            display: grid;
            gap: 10px;
        }

        .task-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .task-card:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .task-card.priority-P0 {
            border-left-color: #dc3545;
        }

        .task-card.priority-P1 {
            border-left-color: #fd7e14;
        }

        .task-card.priority-P2 {
            border-left-color: #ffc107;
        }

        .task-card.priority-P3 {
            border-left-color: #28a745;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .task-text {
            font-size: 1.1em;
            color: #333;
            flex: 1;
        }

        .task-meta {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .time-info {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
            font-size: 0.85em;
            color: #666;
        }

        .time-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 4px;
            background: #e9ecef;
        }

        .time-badge.created {
            background: #d1ecf1;
            color: #0c5460;
        }

        .time-badge.due {
            background: #fff3cd;
            color: #856404;
        }

        .time-badge.completed {
            background: #d4edda;
            color: #155724;
        }

        .time-badge.overdue {
            background: #f8d7da;
            color: #721c24;
            animation: pulse 2s infinite;
        }

        .duration-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 4px;
            background: #e2e3e5;
            color: #383d41;
            font-size: 0.85em;
        }

        .priority-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: bold;
            color: white;
        }

        .priority-badge.P0 { background: #dc3545; }
        .priority-badge.P1 { background: #fd7e14; }
        .priority-badge.P2 { background: #ffc107; color: #333; }
        .priority-badge.P3 { background: #28a745; }

        .date-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            background: #6c757d;
            color: white;
        }

        .date-badge.overdue {
            background: #dc3545;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .tag-list {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .tag {
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.8em;
            background: #e9ecef;
            color: #495057;
        }

        .no-tasks {
            text-align: center;
            color: #999;
            padding: 40px;
            font-size: 1.2em;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .stat-number {
                font-size: 2em;
            }

            .task-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>

        let currentFilter = 'all';
        let currentWorkspaceFilter = 'all';

        function init() {
            generateWorkspaceFilters();
            updateStats();
            renderWorkspaces();
            setupFilters();
            setupCollapseButtons();
            
            // 使用构建时间而不是页面加载时间
            const buildTime = new Date(TODO_DATA.generated_at);
            document.getElementById('last-update').textContent = buildTime.toLocaleString('zh-CN');
        }

        function generateWorkspaceFilters() {
            const filterContainer = document.querySelector('.filter-group:first-child');
            TODO_DATA.workspaces.forEach(workspace => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn workspace-filter';
                btn.dataset.workspace = workspace.name;
                btn.textContent = workspace.name;
                filterContainer.appendChild(btn);
            });
        }

        function updateStats() {
            let total = 0, inProgress = 0, pending = 0, completed = 0;
            
            TODO_DATA.workspaces.forEach(workspace => {
                // 应用工作区筛选
                if (currentWorkspaceFilter !== 'all' && workspace.name !== currentWorkspaceFilter) {
                    return;
                }
                
                workspace.sections.forEach(section => {
                    section.tasks.forEach(task => {
                        total++;
                        if (section.status === '进行中') inProgress++;
                        else if (section.status === '待办') pending++;
                        else if (section.status === '已完成') completed++;
                    });
                });
            });

            document.getElementById('total-tasks').textContent = total;
            document.getElementById('in-progress').textContent = inProgress;
            document.getElementById('pending').textContent = pending;
            document.getElementById('completed').textContent = completed;
        }

        function renderWorkspaces() {
            const container = document.getElementById('workspaces-container');
            container.innerHTML = '';

            TODO_DATA.workspaces.forEach(workspace => {
                // 应用工作区筛选
                if (currentWorkspaceFilter !== 'all' && workspace.name !== currentWorkspaceFilter) {
                    return;
                }
                
                const section = document.createElement('div');
                section.className = 'workspace-section';
                
                const header = document.createElement('div');
                header.className = 'workspace-header';
                
                const titleSpan = document.createElement('span');
                titleSpan.textContent = workspace.name;
                header.appendChild(titleSpan);
                
                const toggleIcon = document.createElement('span');
                toggleIcon.className = 'toggle-icon';
                toggleIcon.textContent = '▼';
                header.appendChild(toggleIcon);
                
                // 添加点击事件
                header.addEventListener('click', () => {
                    section.classList.toggle('collapsed');
                });
                
                section.appendChild(header);

                const content = document.createElement('div');
                content.className = 'workspace-content';

                workspace.sections.forEach(taskSection => {
                    const filteredTasks = taskSection.tasks.filter(task => {
                        if (currentFilter === 'all') return true;
                        return task.priority === currentFilter;
                    });

                    if (filteredTasks.length === 0) return;

                    const group = document.createElement('div');
                    group.className = 'task-group';

                    const title = document.createElement('div');
                    title.className = 'task-group-title';
                    
                    const titleText = document.createElement('span');
                    const statusEmoji = taskSection.status === '进行中' ? '🔴' : 
                                       taskSection.status === '待办' ? '🟡' : '🟢';
                    titleText.textContent = `${statusEmoji} ${taskSection.status} ${taskSection.title ? '(' + taskSection.title + ')' : ''}`;
                    title.appendChild(titleText);
                    
                    const groupToggleIcon = document.createElement('span');
                    groupToggleIcon.className = 'toggle-icon';
                    groupToggleIcon.textContent = '▼';
                    title.appendChild(groupToggleIcon);
                    
                    // 添加点击事件
                    title.addEventListener('click', () => {
                        group.classList.toggle('collapsed');
                    });
                    
                    group.appendChild(title);

                    const taskList = document.createElement('div');
                    taskList.className = 'task-list';

                    filteredTasks.forEach(task => {
                        const taskCard = createTaskCard(task);
                        taskList.appendChild(taskCard);
                    });

                    group.appendChild(taskList);
                    content.appendChild(group);
                });

                if (content.children.length === 0) {
                    const noTasks = document.createElement('div');
                    noTasks.className = 'no-tasks';
                    noTasks.textContent = '暂无任务';
                    content.appendChild(noTasks);
                }

                section.appendChild(content);
                container.appendChild(section);
            });
        }

        function createTaskCard(task) {
            const card = document.createElement('div');
            card.className = `task-card priority-${task.priority || 'P2'}`;

            const header = document.createElement('div');
            header.className = 'task-header';

            const text = document.createElement('div');
            text.className = 'task-text';
            text.textContent = task.text;
            header.appendChild(text);

            const meta = document.createElement('div');
            meta.className = 'task-meta';

            if (task.priority) {
                const priorityBadge = document.createElement('span');
                priorityBadge.className = `priority-badge ${task.priority}`;
                priorityBadge.textContent = task.priority;
                meta.appendChild(priorityBadge);
            }

            header.appendChild(meta);
            card.appendChild(header);

            // 添加时间信息
            const timeInfo = document.createElement('div');
            timeInfo.className = 'time-info';

            // 创建日期
            if (task.createdDate) {
                const createdBadge = document.createElement('span');
                createdBadge.className = 'time-badge created';
                createdBadge.textContent = `📅 创建: ${task.createdDate}`;
                timeInfo.appendChild(createdBadge);
            }

            // 截止日期（未完成任务）
            if (!task.completed && task.dueDate) {
                const dueBadge = document.createElement('span');
                const dueDate = new Date(task.dueDate);
                const today = new Date();
                const isOverdue = dueDate < today;
                
                dueBadge.className = `time-badge due${isOverdue ? ' overdue' : ''}`;
                dueBadge.textContent = isOverdue ? `⚠️ 逾期: ${task.dueDate}` : `⏰ 截止: ${task.dueDate}`;
                timeInfo.appendChild(dueBadge);
            }

            // 完成日期（已完成任务）
            if (task.completed && task.completedDate) {
                const completedBadge = document.createElement('span');
                completedBadge.className = 'time-badge completed';
                completedBadge.textContent = `✅ 完成: ${task.completedDate}`;
                timeInfo.appendChild(completedBadge);
            }

            // 计算任务耗时（已完成任务且有创建日期和完成日期）
            if (task.completed && task.createdDate && task.completedDate) {
                const created = new Date(task.createdDate);
                const completed = new Date(task.completedDate);
                const durationMs = completed - created;
                const durationDays = Math.ceil(durationMs / (1000 * 60 * 60 * 24));
                
                const durationBadge = document.createElement('span');
                durationBadge.className = 'duration-badge';
                durationBadge.textContent = `⏱️ 耗时: ${durationDays}天`;
                timeInfo.appendChild(durationBadge);
            }

            // 计算任务年龄（未完成任务且有创建日期）
            if (!task.completed && task.createdDate) {
                const created = new Date(task.createdDate);
                const today = new Date();
                const ageMs = today - created;
                const ageDays = Math.floor(ageMs / (1000 * 60 * 60 * 24));
                
                if (ageDays > 0) {
                    const ageBadge = document.createElement('span');
                    ageBadge.className = 'duration-badge';
                    ageBadge.textContent = `📆 已${ageDays}天`;
                    timeInfo.appendChild(ageBadge);
                }
            }

            if (timeInfo.children.length > 0) {
                card.appendChild(timeInfo);
            }

            if (task.tags && task.tags.length > 0) {
                const tagList = document.createElement('div');
                tagList.className = 'tag-list';
                task.tags.forEach(tag => {
                    const tagElement = document.createElement('span');
                    tagElement.className = 'tag';
                    tagElement.textContent = tag;
                    tagList.appendChild(tagElement);
                });
                card.appendChild(tagList);
            }

            return card;
        }

        function setupFilters() {
            // 工作区筛选
            const workspaceBtns = document.querySelectorAll('.workspace-filter');
            workspaceBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    workspaceBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentWorkspaceFilter = btn.dataset.workspace;
                    updateStats();
                    renderWorkspaces();
                });
            });
            
            // 优先级筛选
            const priorityBtns = document.querySelectorAll('.priority-filter');
            priorityBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    priorityBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    updateStats();
                    renderWorkspaces();
                });
            });
        }

        function setupCollapseButtons() {
            const collapseAllBtn = document.getElementById('collapse-all');
            const expandAllBtn = document.getElementById('expand-all');
            
            collapseAllBtn.addEventListener('click', () => {
                document.querySelectorAll('.workspace-section').forEach(section => {
                    section.classList.add('collapsed');
                });
            });
            
            expandAllBtn.addEventListener('click', () => {
                document.querySelectorAll('.workspace-section').forEach(section => {
                    section.classList.remove('collapsed');
                });
            });
        }

        // 初始化
        init();
    </script>
</body>
</html>
