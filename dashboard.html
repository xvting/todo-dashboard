<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO 管理中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 3em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
            font-size: 1.1em;
        }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group label {
            font-weight: bold;
            color: #333;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .filter-btn:hover {
            background: #f0f0f0;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .workspace-section {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            overflow: hidden;
        }

        .workspace-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: all 0.3s ease;
        }

        .workspace-header:hover {
            opacity: 0.9;
        }

        .workspace-header .toggle-icon {
            font-size: 1.2em;
            transition: transform 0.3s ease;
        }

        .workspace-section.collapsed .workspace-header .toggle-icon {
            transform: rotate(-90deg);
        }

        .workspace-content {
            padding: 20px;
            max-height: 2000px;
            overflow: hidden;
            transition: max-height 0.5s ease, padding 0.5s ease;
        }

        .workspace-section.collapsed .workspace-content {
            max-height: 0;
            padding: 0 20px;
        }

        .task-group {
            margin-bottom: 30px;
        }

        .task-group-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .task-list {
            display: grid;
            gap: 10px;
        }

        .task-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .task-card:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .task-card.priority-P0 {
            border-left-color: #dc3545;
        }

        .task-card.priority-P1 {
            border-left-color: #fd7e14;
        }

        .task-card.priority-P2 {
            border-left-color: #ffc107;
        }

        .task-card.priority-P3 {
            border-left-color: #28a745;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .task-text {
            font-size: 1.1em;
            color: #333;
            flex: 1;
        }

        .task-meta {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .priority-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: bold;
            color: white;
        }

        .priority-badge.P0 { background: #dc3545; }
        .priority-badge.P1 { background: #fd7e14; }
        .priority-badge.P2 { background: #ffc107; color: #333; }
        .priority-badge.P3 { background: #28a745; }

        .date-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            background: #6c757d;
            color: white;
        }

        .date-badge.overdue {
            background: #dc3545;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .tag-list {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .tag {
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.8em;
            background: #e9ecef;
            color: #495057;
        }

        .no-tasks {
            text-align: center;
            color: #999;
            padding: 40px;
            font-size: 1.2em;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .stat-number {
                font-size: 2em;
            }

            .task-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 TODO 管理中心</h1>
            <p>跨工作区任务管理平台</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="total-tasks">0</div>
                <div class="stat-label">总任务数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="in-progress">0</div>
                <div class="stat-label">进行中</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pending">0</div>
                <div class="stat-label">待办</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completed">0</div>
                <div class="stat-label">已完成</div>
            </div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label>优先级：</label>
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="P0">P0 紧急</button>
                <button class="filter-btn" data-filter="P1">P1 重要</button>
                <button class="filter-btn" data-filter="P2">P2 一般</button>
                <button class="filter-btn" data-filter="P3">P3 可选</button>
            </div>
            <div class="filter-group" style="margin-top: 15px;">
                <label>视图：</label>
                <button class="filter-btn" id="collapse-all">全部折叠</button>
                <button class="filter-btn" id="expand-all">全部展开</button>
            </div>
        </div>

        <div id="workspaces-container">
            <!-- 工作区内容将通过 JavaScript 动态生成 -->
        </div>

        <footer>
            <p>最后更新: <span id="last-update"></span></p>
            <p>Powered by TODO Management System</p>
        </footer>
    </div>

    <script>
        // 这里的数据将由构建脚本注入
        const TODO_DATA = __TODO_DATA_PLACEHOLDER__;

        let currentFilter = 'all';

        function init() {
            updateStats();
            renderWorkspaces();
            setupFilters();
            setupCollapseButtons();
            document.getElementById('last-update').textContent = new Date().toLocaleString('zh-CN');
        }

        function updateStats() {
            let total = 0, inProgress = 0, pending = 0, completed = 0;
            
            TODO_DATA.workspaces.forEach(workspace => {
                workspace.sections.forEach(section => {
                    section.tasks.forEach(task => {
                        total++;
                        if (section.status === '进行中') inProgress++;
                        else if (section.status === '待办') pending++;
                        else if (section.status === '已完成') completed++;
                    });
                });
            });

            document.getElementById('total-tasks').textContent = total;
            document.getElementById('in-progress').textContent = inProgress;
            document.getElementById('pending').textContent = pending;
            document.getElementById('completed').textContent = completed;
        }

        function renderWorkspaces() {
            const container = document.getElementById('workspaces-container');
            container.innerHTML = '';

            TODO_DATA.workspaces.forEach(workspace => {
                const section = document.createElement('div');
                section.className = 'workspace-section';
                
                const header = document.createElement('div');
                header.className = 'workspace-header';
                
                const titleSpan = document.createElement('span');
                titleSpan.textContent = workspace.name;
                header.appendChild(titleSpan);
                
                const toggleIcon = document.createElement('span');
                toggleIcon.className = 'toggle-icon';
                toggleIcon.textContent = '▼';
                header.appendChild(toggleIcon);
                
                // 添加点击事件
                header.addEventListener('click', () => {
                    section.classList.toggle('collapsed');
                });
                
                section.appendChild(header);

                const content = document.createElement('div');
                content.className = 'workspace-content';

                workspace.sections.forEach(taskSection => {
                    const filteredTasks = taskSection.tasks.filter(task => {
                        if (currentFilter === 'all') return true;
                        return task.priority === currentFilter;
                    });

                    if (filteredTasks.length === 0) return;

                    const group = document.createElement('div');
                    group.className = 'task-group';

                    const title = document.createElement('div');
                    title.className = 'task-group-title';
                    const statusEmoji = taskSection.status === '进行中' ? '🔴' : 
                                       taskSection.status === '待办' ? '🟡' : '🟢';
                    title.textContent = `${statusEmoji} ${taskSection.status} ${taskSection.title ? '(' + taskSection.title + ')' : ''}`;
                    group.appendChild(title);

                    const taskList = document.createElement('div');
                    taskList.className = 'task-list';

                    filteredTasks.forEach(task => {
                        const taskCard = createTaskCard(task);
                        taskList.appendChild(taskCard);
                    });

                    group.appendChild(taskList);
                    content.appendChild(group);
                });

                if (content.children.length === 0) {
                    const noTasks = document.createElement('div');
                    noTasks.className = 'no-tasks';
                    noTasks.textContent = '暂无任务';
                    content.appendChild(noTasks);
                }

                section.appendChild(content);
                container.appendChild(section);
            });
        }

        function createTaskCard(task) {
            const card = document.createElement('div');
            card.className = `task-card priority-${task.priority || 'P2'}`;

            const header = document.createElement('div');
            header.className = 'task-header';

            const text = document.createElement('div');
            text.className = 'task-text';
            text.textContent = task.text;
            header.appendChild(text);

            const meta = document.createElement('div');
            meta.className = 'task-meta';

            if (task.priority) {
                const priorityBadge = document.createElement('span');
                priorityBadge.className = `priority-badge ${task.priority}`;
                priorityBadge.textContent = task.priority;
                meta.appendChild(priorityBadge);
            }

            if (task.dueDate) {
                const dateBadge = document.createElement('span');
                dateBadge.className = 'date-badge';
                const dueDate = new Date(task.dueDate);
                const today = new Date();
                if (dueDate < today) {
                    dateBadge.classList.add('overdue');
                }
                dateBadge.textContent = task.dueDate;
                meta.appendChild(dateBadge);
            }

            header.appendChild(meta);
            card.appendChild(header);

            if (task.tags && task.tags.length > 0) {
                const tagList = document.createElement('div');
                tagList.className = 'tag-list';
                task.tags.forEach(tag => {
                    const tagElement = document.createElement('span');
                    tagElement.className = 'tag';
                    tagElement.textContent = tag;
                    tagList.appendChild(tagElement);
                });
                card.appendChild(tagList);
            }

            return card;
        }

        function setupFilters() {
            const filterBtns = document.querySelectorAll('.filter-btn[data-filter]');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderWorkspaces();
                });
            });
        }

        function setupCollapseButtons() {
            const collapseAllBtn = document.getElementById('collapse-all');
            const expandAllBtn = document.getElementById('expand-all');
            
            collapseAllBtn.addEventListener('click', () => {
                document.querySelectorAll('.workspace-section').forEach(section => {
                    section.classList.add('collapsed');
                });
            });
            
            expandAllBtn.addEventListener('click', () => {
                document.querySelectorAll('.workspace-section').forEach(section => {
                    section.classList.remove('collapsed');
                });
            });
        }

        // 初始化
        init();
    </script>
</body>
</html>
